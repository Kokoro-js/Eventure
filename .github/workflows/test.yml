name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare package
        uses: ./.github/actions/prepare-package

      - name: Verify
        run: |
          bun run format:check
          bun run lint
          bun run type-check
          bun run build
          bun run test

  benchmark:
    name: Benchmark
    needs: test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4

      - name: Prepare PR package
        uses: ./.github/actions/prepare-package

      - name: Build PR distribution
        run: bun run build

      - name: Prepare benchmark package
        uses: ./.github/actions/prepare-package
        with:
          working-directory: tinybench
          setup-runtime: 'false'

      - name: Checkout baseline
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.base.repo.full_name }}
          ref: ${{ github.event.pull_request.base.sha }}
          path: baseline

      - name: Prepare baseline package
        uses: ./.github/actions/prepare-package
        with:
          working-directory: baseline
          setup-runtime: 'false'
          install-args: '--no-save'

      - name: Build baseline distribution
        working-directory: baseline
        run: bun run build

      - name: Run API regression benchmark
        id: api_benchmark
        continue-on-error: true
        run: bun ./tinybench/apiRegression.ts ./baseline/dist/index.mjs ./dist/index.mjs

      - name: Run emit reference benchmark
        id: compare_benchmark
        run: bun ./tinybench/onlyEmit.ts ./baseline/dist/index.mjs ./dist/index.mjs

      - name: Comment on PR with benchmark results
        if: always()
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            })
            const marker = '<!-- benchmark-report -->'
            const apiMarkdown = ${{ toJSON(steps.api_benchmark.outputs.markdown) }}
            const compareMarkdown = ${{ toJSON(steps.compare_benchmark.outputs.markdown) }}
            const sections = []
            if (apiMarkdown) sections.push(apiMarkdown)
            else sections.push('## Eventure API Performance\n\nAPI regression benchmark did not produce markdown output.')
            sections.push('---')
            if (compareMarkdown) sections.push(compareMarkdown)
            else sections.push('## Emit Reference Benchmark\n\nEmit reference benchmark did not produce markdown output.')
            const markdown = sections.join('\n\n')
            const body = `${marker}\n${markdown}`
            const existing = comments.find((c) => c.body?.startsWith(marker))
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              })
            }

      - name: Fail on API performance regression
        if: steps.api_benchmark.outcome == 'failure'
        run: exit 1
