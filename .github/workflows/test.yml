name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Set up Bun.js
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify
        run: |
          bun run format:check
          bun run lint
          bun run type-check
          bun run build
          bun run test

  benchmark:
    name: Benchmark
    needs: test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout PR code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Bun.js
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build distribution
        run: bun run build

      - name: Install benchmark dependencies
        working-directory: tinybench
        run: bun install --frozen-lockfile

      - name: Checkout baseline
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.base.repo.full_name }}
          ref: ${{ github.event.pull_request.base.sha }}
          path: baseline
          fetch-depth: 0

      - name: Install dependencies (baseline)
        working-directory: baseline
        run: bun install --frozen-lockfile

      - name: Build distribution (baseline)
        working-directory: baseline
        run: bun run build

      - name: Run paired benchmarks
        id: benchmark
        env:
          BENCH_EVENTURE_BASELINE_IMPORT: ${{ github.workspace }}/baseline/dist/index.mjs
          BENCH_EVENTURE_TARGET_IMPORT: ${{ github.workspace }}/dist/index.mjs
          BENCH_GITHUB_OUTPUT_NAME: markdown
        run: bun ./tinybench/onlyEmit.ts

      - name: Comment on PR with benchmark delta
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            })
            const marker = '<!-- benchmark-report -->'
            const markdown = ${{ toJSON(steps.benchmark.outputs.markdown) }}
            const body = `${marker}\n${markdown}`
            const existing = comments.find((c) => c.body?.startsWith(marker))
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              })
            }
